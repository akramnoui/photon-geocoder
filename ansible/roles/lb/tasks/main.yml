---
- name: Install Nginx
  become: true
  ansible.builtin.package:
    name: nginx
    state: present

- name: Deploy nginx.conf
  become: true
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    mode: "0644"
    backup: true
  notify: Reload nginx

- name: Deploy the Photon load-balancer config
  become: true
  ansible.builtin.template:
    src: photon-lb.conf.j2
    dest: /etc/nginx/conf.d/photon.conf
    mode: "0644"
  notify: Reload nginx

# A bad render fails the play here, before the reload: a running Nginx
# keeps its last-good config.
- name: Validate the Nginx configuration
  become: true
  ansible.builtin.command: nginx -t
  changed_when: false

- name: Enable and start Nginx
  become: true
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: started

# The old LB terminated TLS with a self-signed certificate; no longer referenced.
- name: Purge the legacy certificate
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/nginx/nginx-selfsigned.crt
    - /etc/nginx/nginx-selfsigned.key
  when: cleanup_legacy | bool
