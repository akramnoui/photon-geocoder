---
- name: Garde-fou RAM
  ansible.builtin.assert:
    that:
      - ansible_memtotal_mb >= (photon_min_ram_gb | int) * 1024 or photon_force
    fail_msg: >-
      RAM {{ (ansible_memtotal_mb / 1024) | round }} Go < {{ photon_min_ram_gb }} Go :
      l'import Europe va swapper. Vise 64 Go, ou -e photon_force=true.
    quiet: true

- name: Installer les paquets (Debian/Ubuntu)
  become: true
  ansible.builtin.apt:
    name: [openjdk-21-jre-headless, zstd, curl]
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"

- name: Installer les paquets
  become: true
  ansible.builtin.dnf:
    name: [java-21-openjdk-headless, zstd, curl]
    state: present
  when: ansible_os_family == "RedHat"

- name: Contrôler la version de Java
  ansible.builtin.command: "{{ photon_java }} -version"
  changed_when: false
  register: photon_java_version

- name: Exiger Java 21
  ansible.builtin.assert:
    that:
      - photon_java_version.stderr is search('version .21')
    fail_msg: "Java 21 requis ; {{ photon_java }} -> {{ photon_java_version.stderr_lines | first | default('?') }}"
    quiet: true

- name: Créer l'utilisateur de service
  become: true
  ansible.builtin.user:
    name: "{{ photon_user }}"
    system: true
    home: "{{ photon_app_dir }}"
    create_home: false
    shell: /usr/sbin/nologin
  when: photon_user != "root"

- name: Créer l'arborescence
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ photon_user }}"
    group: "{{ photon_user }}"
    mode: "0755"
  loop:
    - "{{ photon_app_dir }}"
    - "{{ photon_app_dir }}/data/dumps"

- name: Télécharger le jar Photon
  become: true
  ansible.builtin.get_url:
    url: "{{ photon_jar_url }}"
    dest: "{{ photon_jar }}"
    owner: "{{ photon_user }}"
    group: "{{ photon_user }}"
    mode: "0644"
    timeout: 60
  environment:
    https_proxy: "{{ photon_proxy }}"
    http_proxy: "{{ photon_proxy }}"

- name: Télécharger les dumps JSON
  become: true
  ansible.builtin.get_url:
    url: "{{ item }}"
    dest: "{{ photon_app_dir }}/data/dumps/{{ item | basename }}"
    owner: "{{ photon_user }}"
    group: "{{ photon_user }}"
    mode: "0644"
    timeout: 60
  loop: "{{ photon_dump_urls }}"
  environment:
    https_proxy: "{{ photon_proxy }}"
    http_proxy: "{{ photon_proxy }}"

- name: Déployer le script de construction d'index
  become: true
  ansible.builtin.template:
    src: photon-build-index.sh.j2
    dest: "{{ photon_app_dir }}/photon-build-index.sh"
    owner: "{{ photon_user }}"
    group: "{{ photon_user }}"
    mode: "0755"

- name: Déployer les units systemd
  become: true
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/etc/systemd/system/{{ item }}"
    mode: "0644"
  loop:
    - photon-index-build.service
    - photon.service
  notify: Recharger systemd

- name: Appliquer les changements systemd
  ansible.builtin.meta: flush_handlers

- name: État de l'index
  become: true
  ansible.builtin.stat:
    path: "{{ photon_app_dir }}/data/photon_data"
  register: photon_index

- name: Construire l'index en arrière-plan
  become: true
  ansible.builtin.command: systemctl start --no-block photon-index-build.service
  changed_when: true
  when: not photon_index.stat.exists or photon_force

- name: Suite des opérations
  ansible.builtin.debug:
    msg:
      - "Index en construction (service photon-index-build, ~1-3 h)."
      - "Suivi  : journalctl -u photon-index-build -f"
      - "Servir : sudo systemctl enable --now photon"
      - "Tester : curl 'http://{{ photon_listen_ip }}:{{ photon_listen_port }}/api?q=Paris&limit=1'"
