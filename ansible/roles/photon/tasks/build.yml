---
- name: Create the dumps directory
  become: true
  ansible.builtin.file:
    path: "{{ photon_data_dir }}/dumps"
    state: directory
    owner: "{{ photon_user }}"
    group: "{{ photon_user }}"
    mode: "0755"

# uniquement pour éviter de relancer le build inutilement sur les anciens index dans le PoC,
# mais pas nécessaire pour les index construits avec le script de build qui crée un marqueur de build
- name: Look for dumps left in the old data dir
  become: true
  ansible.builtin.find:
    paths: "{{ photon_app_dir }}/data/dumps"
    patterns: "*.jsonl.zst"
  register: photon_old_dumps
  when: photon_data_dir != photon_app_dir + '/data'

- name: Migrate the dumps from the old data dir
  become: true
  ansible.builtin.command: >-
    mv -n {{ item.path }} {{ photon_data_dir }}/dumps/
  loop: "{{ photon_old_dumps.files | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  changed_when: true
  when: photon_data_dir != photon_app_dir + '/data'

- name: List dumps already present
  become: true
  ansible.builtin.find:
    paths: "{{ photon_data_dir }}/dumps"
    patterns: "*.jsonl.zst"
  register: photon_present_dumps

- name: Download the JSON dumps
  become: true
  ansible.builtin.get_url:
    url: "{{ item }}"
    dest: "{{ photon_data_dir }}/dumps/{{ item | basename }}"
    force: "{{ photon_force | bool }}"
    owner: "{{ photon_user }}"
    group: "{{ photon_user }}"
    mode: "0644"
    timeout: 60
  loop: "{{ photon_dump_urls }}"
  register: photon_dumps_dl
  until: photon_dumps_dl is succeeded
  retries: 3
  delay: 30
  when: >-
    photon_force | bool
    or (item | basename)
       not in (photon_present_dumps.files | map(attribute='path') | map('basename') | list)
  environment:
    https_proxy: "{{ photon_proxy }}"
    http_proxy: "{{ photon_proxy }}"

- name: Deploy the index build script
  become: true
  ansible.builtin.template:
    src: photon-build-index.sh.j2
    dest: "{{ photon_app_dir }}/photon-build-index.sh"
    owner: "{{ photon_user }}"
    group: "{{ photon_user }}"
    mode: "0755"

- name: Deploy the photon-index-build.service unit
  become: true
  ansible.builtin.template:
    src: photon-index-build.service.j2
    dest: /etc/systemd/system/photon-index-build.service
    mode: "0644"
  register: photon_build_unit

- name: Reload systemd after a unit change
  become: true
  ansible.builtin.systemd:
    daemon_reload: true
  when: photon_build_unit is changed

- name: Check for an existing index
  become: true
  ansible.builtin.stat:
    path: "{{ photon_data_dir }}/photon_data"
  register: photon_index

- name: Check the build service state
  become: true
  ansible.builtin.command: systemctl is-active photon-index-build.service
  register: photon_build_active
  changed_when: false
  failed_when: false

- name: Decide whether to build
  ansible.builtin.set_fact:
    photon_build_needed: "{{ photon_force | bool or not photon_index.stat.exists }}"
    photon_build_running: "{{ photon_build_active.stdout == 'activating' }}"

- name: Check the free space on the data volume
  become: true
  ansible.builtin.shell: df --output=avail -BG {{ photon_data_dir }} | tail -1 | tr -dc '0-9'
  register: photon_data_free
  changed_when: false
  when: photon_build_needed and not photon_build_running

- name: Require enough space for the build
  ansible.builtin.assert:
    that:
      - photon_data_free.stdout | int >= photon_build_min_free_gb | int
    fail_msg: >-
      {{ photon_data_free.stdout | default('?') }} GB free on
      {{ photon_data_dir }}, {{ photon_build_min_free_gb }} GB required for
      the build (staging + previous index coexist until the final swap).
      Free space or extend the volume before retrying.
    quiet: true
  when: photon_build_needed and not photon_build_running

- name: Start the index build (detached service)
  become: true
  ansible.builtin.shell: >-
    systemctl stop photon-index-build.service &&
    systemctl start --no-block photon-index-build.service
  changed_when: true
  when: photon_build_needed and not photon_build_running
  notify: Restart photon

- name: Wait for the build to finish
  become: true
  ansible.builtin.command: systemctl is-active photon-index-build.service
  register: photon_build_state
  until: photon_build_state.stdout in ['active', 'failed']
  retries: 240
  delay: 120
  changed_when: false
  failed_when: photon_build_state.stdout != 'active'
  when: photon_build_needed or photon_build_runnin


# introduit pour les index construit avant la version 1.2.0, qui ne laissent pas de marqueur de build; à la base 
# le script de build crée des marqueurs de build pour éviter de relancer le build inutilement, mais les index construits avant la version 1.2.0 n'ont pas de marqueur, 
# donc on en crée un pour éviter de relancer le build inutilement sur les anciens index
- name: Check for the build marker
  become: true
  ansible.builtin.stat:
    path: "{{ photon_data_dir }}/photon_data/.build-id"
  register: photon_build_marker

- name: Write the build marker if missing
  become: true
  ansible.builtin.copy:
    dest: "{{ photon_data_dir }}/photon_data/.build-id"
    content: "{{ ansible_date_time.iso8601 }}\n"
    owner: "{{ photon_user }}"
    group: "{{ photon_user }}"
    mode: "0644"
  when: not photon_build_marker.stat.exists
