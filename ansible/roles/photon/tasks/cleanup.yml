---
# Nettoie le leftovers de l'ancienne installation de Photon / cas spécial car on avait fait un déploiement 
# avec une stratégie de cartes différente

- name: Detect legacy leftovers
  become: true
  ansible.builtin.stat:
    path: /data/photon
  register: photon_legacy_data

- name: Report legacy leftovers
  ansible.builtin.debug:
    msg: >-
      Leftovers from the old deployments found (/data/photon).
      Re-run with -e cleanup_legacy=true to purge them.
  when: photon_legacy_data.stat.exists and not cleanup_legacy | bool

- name: Purge legacy leftovers
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /data/photon
    - /opt/photon/photon_data
    - /var/log/photon
  when: cleanup_legacy | bool

- name: Remove the old data tree under the app dir
  become: true
  ansible.builtin.file:
    path: "{{ photon_app_dir }}/data"
    state: absent
  when: photon_data_dir != photon_app_dir + '/data'
