---
- name: Install packages (Debian/Ubuntu)
  become: true
  ansible.builtin.apt:
    name: [openjdk-21-jre-headless, zstd, curl, rsync]
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"

- name: Install packages
  become: true
  ansible.builtin.dnf:
    name: [java-21-openjdk-headless, zstd, curl, rsync]
    state: present
  when: ansible_os_family == "RedHat"

- name: Check the Java version
  ansible.builtin.command: "{{ photon_java }} -version"
  changed_when: false
  register: photon_java_version

- name: Require Java 21
  ansible.builtin.assert:
    that:
      - photon_java_version.stderr is search('version .21')
    fail_msg: "Java 21 required; {{ photon_java }} -> {{ photon_java_version.stderr_lines | first | default('?') }}"
    quiet: true

- name: Create the service user
  become: true
  ansible.builtin.user:
    name: "{{ photon_user }}"
    system: true
    create_home: false
    shell: /sbin/nologin
  when: photon_user != "root"

- name: Create the directory tree
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ photon_user }}"
    group: "{{ photon_user }}"
    mode: "0755"
  loop:
    - "{{ photon_app_dir }}"
    - "{{ photon_data_dir }}"

- name: Download the Photon jar
  become: true
  ansible.builtin.get_url:
    url: "{{ photon_jar_url }}"
    dest: "{{ photon_jar }}"
    checksum: "{{ photon_jar_checksum | default(omit, true) }}"
    owner: "{{ photon_user }}"
    group: "{{ photon_user }}"
    mode: "0644"
    timeout: 60
  register: photon_jar_dl
  until: photon_jar_dl is succeeded
  retries: 3
  delay: 10
  environment:
    https_proxy: "{{ photon_proxy }}"
    http_proxy: "{{ photon_proxy }}"

- name: Deploy the photon.service unit
  become: true
  ansible.builtin.template:
    src: photon.service.j2
    dest: /etc/systemd/system/photon.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart photon

- name: Build the index (leader)
  ansible.builtin.import_tasks: build.yml
  when: photon_is_leader | bool

- name: Receive the index from the leader (followers)
  ansible.builtin.import_tasks: sync.yml
  when: not photon_is_leader | bool

- name: Apply pending systemd changes
  ansible.builtin.meta: flush_handlers

- name: Enable and start photon
  become: true
  ansible.builtin.systemd:
    name: photon
    enabled: true
    state: started

- name: Wait for photon to answer on its port
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ photon_listen_port }}"
    timeout: 300

- name: Handle leftovers from the old playbooks
  ansible.builtin.import_tasks: cleanup.yml
